version: "3.8"
services:
  api:
    build: .
    container_name: legal_ml_api
    command: uvicorn deployment.fastapi_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app

  streamlit:
    build: .
    container_name: legal_ml_streamlit
    command: streamlit run deployment/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
